<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Productos</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/css/styles.css">

</head>

<body class="bg-gray-100">


<!-- =========================
NAVBAR
========================= -->

<header class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-3">

<img
id="store-logo"
src="https://mercadia-back-production.up.railway.app/uploads/default-logo.png"
class="h-10 w-auto"
>

<h1 id="store-name" class="text-lg font-bold">
Tienda
</h1>

</div>


<nav class="hidden md:flex gap-8 text-sm font-medium">

<a href="/index.html" class="hover:opacity-70">Inicio</a>

<a href="/products.html" class="hover:opacity-70">Productos</a>

<a href="/categorias.html" class="hover:opacity-70">Categorías</a>

</nav>


<div class="flex items-center gap-4">

<button onclick="openCart()" class="relative bg-black text-white w-12 h-12 rounded flex items-center justify-center">

<span class="text-lg">🛒</span>

<span 
id="cart-count"
class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 rounded-full"
>
0
</span>

</button>


<button id="menu-btn" class="md:hidden text-2xl">
☰
</button>

</div>

</div>


<div id="mobile-menu" class="hidden md:hidden bg-white border-t">

<a href="/index.html" class="block p-4 border-b">Inicio</a>

<a href="/products.html" class="block p-4 border-b">Productos</a>

<a href="/categorias.html" class="block p-4">Categorías</a>

</div>

</header>



<!-- =========================
TITLE
========================= -->

<section class="max-w-7xl mx-auto p-6 md:p-10">

<h2 class="text-2xl md:text-3xl font-bold mb-8 text-center">
Todos los productos
</h2>


<div
id="products-list"
class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8"
>

<!--
Las cards de producto se renderizan desde products.js

Estructura esperada:

<div class="product-card">

<div class="product-image">
<img src="URL_IMAGEN">
</div>

<div class="product-info">

<div class="product-title">
Nombre del producto
</div>

<div class="product-price">
$350
</div>

<button class="product-btn">
Añadir al carrito
</button>

</div>

</div>

-->

</div>

</section>



<!-- =========================
FOOTER
========================= -->

<footer class="bg-black text-white mt-20">

<div class="max-w-7xl mx-auto p-8 text-center opacity-80">

<p id="store-footer">
Powered by Mercadia
</p>

</div>

</footer>



<!-- =========================
CARRITO
========================= -->

<div id="cart-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="bg-white rounded w-[400px] max-w-[90%] max-h-[90vh] flex flex-col">

    <!-- HEADER -->
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="text-xl font-bold">Tu carrito</h2>
      <button onclick="closeCart()">✕</button>
    </div>

    <!-- ITEMS (SCROLL) -->
    <div id="cart-items" class="flex-1 overflow-y-auto p-4"></div>

    <!-- FOOTER FIJO -->
    <div class="p-4 border-t">

      <div class="flex justify-between font-bold mb-3">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>

      <div class="flex gap-3">

        <button onclick="closeCart()" class="flex-1 border p-2 rounded">
          Cerrar
        </button>

        <button onclick="checkout()" class="flex-1 bg-black text-white p-2 rounded">
          Enviar pedido
        </button>

      </div>

    </div>

  </div>

</div>

<!-- =========================
SCRIPTS
========================= -->

<script type="module" src="/js/store.js"></script>
<script type="module" src="/js/products.js"></script>
<script type="module" src="/js/cart.js"></script>


<script>

const btn = document.getElementById("menu-btn")
const menu = document.getElementById("mobile-menu")

btn.addEventListener("click", () => {

menu.classList.toggle("hidden")

})

</script>

</body>
</html>
