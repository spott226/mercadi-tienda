<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Categorías | Mercadia</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>

<!-- =========================
NAVBAR
========================= -->

<header class="shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-3">

<img
id="store-logo"
src="https://mercadia-back-production.up.railway.app/uploads/default-logo.png"
class="h-10 w-auto"
>

<h1 id="store-name" class="text-xl font-bold">
Tienda
</h1>

</div>


<!-- MENU DESKTOP -->

<nav class="hidden md:flex gap-8 text-sm font-medium">

<a href="/index.html" class="hover:opacity-70">Inicio</a>
<a href="/products.html" class="hover:opacity-70">Productos</a>
<a href="/categorias.html" class="hover:opacity-70">Categorías</a>

</nav>


<!-- BOTONES DERECHA -->

<div class="flex items-center gap-4">

<!-- BOTON CARRITO -->

<button onclick="openCart()" class="relative w-12 h-12 rounded flex items-center justify-center">

<span class="text-lg">🛒</span>

<span 
id="cart-count"
class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 rounded-full"
>
0
</span>

</button>

<!-- BOTON MENU MOBILE -->

<button id="menu-btn" class="md:hidden text-2xl">
☰
</button>

</div>

</div>


<!-- MENU MOBILE -->

<div id="mobile-menu" class="hidden md:hidden border-t">

<a href="/index.html" class="block p-4 border-b">Inicio</a>
<a href="/products.html" class="block p-4 border-b">Productos</a>
<a href="/categorias.html" class="block p-4">Categorías</a>

</div>

</header>


<!-- =========================
CATEGORÍAS
========================= -->

<section class="max-w-7xl mx-auto p-6 md:p-10">

<h2 class="text-2xl md:text-3xl font-bold mb-8 text-center">
Categorías
</h2>

<div
id="categorias"
class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
>
</div>

</section>


<!-- =========================
FOOTER
========================= -->

<footer class="mt-20">

<div class="max-w-7xl mx-auto p-8 text-center opacity-80">

<p id="store-footer">
Powered by Mercadia
</p>

</div>

</footer>


<!-- =========================
CHATBOT
========================= -->

<div id="chatbot-container"></div>


<!-- =========================
CARRITO MODAL
========================= -->

<div id="cart-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

<div class="p-6 rounded w-[400px] max-w-[90%]">

<h2 class="text-xl font-bold mb-4">Tu carrito</h2>

<div id="cart-items"></div>

<div class="flex justify-between mt-4 font-bold">

<span>Total</span>
<span id="cart-total">$0</span>

</div>

<div class="flex gap-3 mt-6">

<button onclick="closeCart()" class="flex-1 border p-2 rounded">
Cerrar
</button>

<button onclick="checkout()" class="flex-1 p-2 rounded">
Enviar pedido
</button>

</div>

</div>

</div>


<!-- =========================
SCRIPTS
========================= -->

<script type="module" src="/js/store.js"></script>
<script type="module" src="/js/cart.js"></script>
<script type="module" src="/js/chatbot.js"></script>


<script type="module">

import { getProducts } from "/js/api.js";

function getSlugFromDomain(){

const host = window.location.hostname;

if(host === "localhost" || host === "127.0.0.1"){
return "chelispa";
}

return host.split(".")[0];

}

async function loadCategorias(){

const slug = getSlugFromDomain();

const products = await getProducts(slug);

if(!products) return;

const categorias = [...new Set(products.map(p => p.category))];

const container = document.getElementById("categorias");

container.innerHTML = "";

categorias.forEach(cat => {

const categorySlug = encodeURIComponent(cat);

container.innerHTML += `

<a href="/products.html?category=${categorySlug}" 
class="p-6 rounded shadow hover:shadow-lg cursor-pointer transition text-center block">

<h3 class="text-lg font-semibold">${cat}</h3>

</a>

`;

});

}

loadCategorias();

</script>


<script>

const btn = document.getElementById("menu-btn")
const menu = document.getElementById("mobile-menu")

btn.addEventListener("click", () => {

menu.classList.toggle("hidden")

})

</script>

</body>
</html>
