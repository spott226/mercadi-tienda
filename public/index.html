<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MERCADIA</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet" href="/css/styles.css">

</head>

<body>


<!-- =========================
NAVBAR
========================= -->

<header class="shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-3">

<img
id="store-logo"
src="/assets/images/logo2.png"
class="h-10 w-auto"
>

<h1 id="store-name" class="text-xl font-bold">
Tienda
</h1>

</div>


<nav class="hidden md:flex gap-8 text-sm font-medium">

<a href="/" class="hover:opacity-70">Inicio</a>

<a href="/products.html" class="hover:opacity-70">Productos</a>

<a href="/categorias.html" class="hover:opacity-70">Categorías</a>

</nav>


<div class="flex items-center gap-4">

<button onclick="openCart()" class="relative w-12 h-12 rounded flex items-center justify-center">

<span class="text-lg">🛒</span>

<span 
id="cart-count"
class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] px-1.5 rounded-full"
>
0
</span>

</button>

<button id="menu-btn" class="md:hidden text-2xl">
☰
</button>

</div>

</div>


<div id="mobile-menu" class="hidden md:hidden border-t">

<a href="/" class="block p-4 border-b">Inicio</a>

<a href="/products.html" class="block p-4 border-b">Productos</a>

<a href="/categorias.html" class="block p-4">Categorías</a>

</div>

</header>



<!-- =========================
HERO
========================= -->

<section class="hero relative h-[420px] flex items-end justify-center text-center text-white">

  <img
    id="hero-image"
    src="/assets/images/hero2.png"
    class="absolute inset-0 w-full h-full object-cover"
  >

  <div class="hero-overlay absolute inset-0"></div>

  <div class="relative z-10 max-w-xl px-6 mb-16">

    <a href="/products.html" class="px-6 py-3 rounded hover:opacity-90 transition">
      Ver catálogo
    </a>

  </div>

</section>

<!-- =========================
PRODUCTOS DESTACADOS
========================= -->

<section class="max-w-7xl mx-auto p-6 md:p-10">

<h2 class="text-2xl md:text-3xl font-bold mb-8 text-center">
Productos destacados
</h2>

<div 
id="products"
class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 md:gap-8"
>

</div>

</section>



<!-- =========================
FOOTER
========================= -->

<footer class="mt-20">

<div class="max-w-7xl mx-auto p-8 text-center opacity-80">

<p id="store-footer">
Powered by Mercadia
</p>

</div>

</footer>



<!-- =========================
CHATBOT
========================= -->

<div id="chatbot-container"></div>



<!-- =========================
CARRITO
========================= -->

<div id="cart-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">

  <div class="rounded w-[400px] max-w-[90%] max-h-[90vh] flex flex-col">

    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="text-xl font-bold">Tu carrito</h2>
      <button onclick="closeCart()">✕</button>
    </div>

    <div id="cart-items" class="flex-1 overflow-y-auto p-4"></div>

    <div class="p-4 border-t">

      <div class="flex justify-between font-bold mb-3">
        <span>Total</span>
        <span id="cart-total">$0</span>
      </div>

      <div class="flex gap-3">

        <button onclick="closeCart()" class="flex-1 border p-2 rounded">
          Cerrar
        </button>

        <button onclick="checkout()" class="flex-1 p-2 rounded">
          Enviar pedido
        </button>

      </div>

    </div>

  </div>

</div>


<!-- =========================
FORMULARIO CHECKOUT (NUEVO)
========================= -->

<div id="checkout-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">

  <div class="rounded-lg w-[400px] max-w-[90%] p-6">

    <h2 class="text-xl font-bold mb-4">Datos de envío</h2>

    <input id="c-name" placeholder="Nombre completo" class="w-full border p-2 mb-2 rounded">
    <input id="c-phone" placeholder="Teléfono" class="w-full border p-2 mb-2 rounded">
    <input id="c-address" placeholder="Calle y número" class="w-full border p-2 mb-2 rounded">
    <input id="c-colony" placeholder="Colonia" class="w-full border p-2 mb-2 rounded">
    <input id="c-city" placeholder="Ciudad" class="w-full border p-2 mb-2 rounded">
    <input id="c-state" placeholder="Estado" class="w-full border p-2 mb-2 rounded">
    <input id="c-postal" placeholder="Código postal" class="w-full border p-2 mb-2 rounded">
    <input id="c-ref" placeholder="Referencia (opcional)" class="w-full border p-2 mb-4 rounded">

    <button onclick="sendCheckout()" class="w-full py-2 rounded">
      Enviar pedido
    </button>

    <button onclick="closeCheckout()" class="mt-2 w-full">
      Cancelar
    </button>

  </div>

</div>


<!-- =========================
SCRIPTS
========================= -->

<script type="module" src="/js/chatbot.js"></script>
<script type="module" src="/js/store.js"></script>
<script type="module" src="/js/products.js"></script>
<script type="module" src="/js/cart.js"></script>

<script>

const btn = document.getElementById("menu-btn")
const menu = document.getElementById("mobile-menu")

btn.addEventListener("click", () => {
  menu.classList.toggle("hidden")
})

</script>

</body>
</html>
